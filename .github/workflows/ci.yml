name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service: [api, worker, frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Containerfile
          push: false
          tags: ghcr.io/${{ github.repository_owner }}/devops-projekt-${{ matrix.service }}:${{ github.sha }}
          load: true

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/devops-projekt-${{ matrix.service }}:${{ github.sha }}
          format: table
          exit-code: '0'
          severity: CRITICAL,HIGH
          output: trivy-${{ matrix.service }}.txt

      - name: Upload scan report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report-${{ matrix.service }}
          path: trivy-${{ matrix.service }}.txt

      - name: Push image
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Containerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/devops-projekt-${{ matrix.service }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/devops-projekt-${{ matrix.service }}:latest
